/* ── 5. ORDER VERIFICATION ── */
function Verify() {
  const [f, setF] = useState({ name: "", email: "", order: "" });
  const [done, setDone] = useState(false);
  const [loading, setLoading] = useState(false);
  const submit = async (e) => {
    e.preventDefault();
    if (!f.name || !f.email || !f.order) return;
    setLoading(true);
    await fetch(FORMSPREE, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify({ _subject: `Bonus Claim – Order ${f.order}`, name: f.name, email: f.email, order: f.order }),
    }).catch(() => {});
    setLoading(false);
    setDone(true);
  };
  return (
    <section className="px-5 pb-16">
      <div className="max-w-xl mx-auto bg-white border-2 border-emerald-500 rounded-2xl p-6 sm:p-8 shadow-[0_18px_0_-6px_rgba(16,185,129,.18)]">
        {!done ? (
          <>
            <div className="flex items-center gap-2.5">
              <div className="w-10 h-10 rounded-xl bg-emerald-100 text-emerald-700 flex items-center justify-center flex-none"><Gift size={20}/></div>
              <h2 className="font-black text-xl sm:text-2xl tracking-tight">Already ordered on Amazon? Claim your bonuses.</h2>
            </div>
            <p className="text-[15px] text-neutral-600 mt-3">Enter your details and Amazon Order ID — we'll email your cookbook PDF and activate your upgraded 2-year warranty.</p>
            <form onSubmit={submit} className="mt-5 space-y-3">
              <input required placeholder="First name" value={f.name} onChange={e => setF({ ...f, name: e.target.value })}
                     className="w-full border-2 border-neutral-300 focus:border-emerald-500 outline-none rounded-lg px-4 py-3 text-[16px]"/>
              <input required type="email" placeholder="Email address" value={f.email} onChange={e => setF({ ...f, email: e.target.value })}
                     className="w-full border-2 border-neutral-300 focus:border-emerald-500 outline-none rounded-lg px-4 py-3 text-[16px]"/>
              <input required placeholder="Amazon Order ID (e.g. 249-1234567-1234567)" value={f.order} onChange={e => setF({ ...f, order: e.target.value })}
                     className="w-full border-2 border-neutral-300 focus:border-emerald-500 outline-none rounded-lg px-4 py-3 text-[16px]"/>
              <button type="submit" disabled={loading} className="w-full bg-emerald-500 hover:bg-emerald-600 disabled:opacity-60 text-white font-extrabold rounded-lg px-5 py-4 text-lg transition-colors">
                {loading ? "Sending…" : "Verify Order & Unlock My Bonuses →"}
              </button>
            </form>
            <p className="text-[11px] text-neutral-400 mt-3 text-center">We only use your details to deliver your bonuses. No spam, ever.</p>
          </>
        ) : (
          <div className="text-center py-4">
            <div className="w-14 h-14 rounded-2xl bg-emerald-100 text-emerald-700 flex items-center justify-center mx-auto"><Check size={28} sw={2.6}/></div>
            <h2 className="font-black text-2xl mt-4">You're verified, {f.name}!</h2>

          </div>
        )}
      </div>
    </section>
  );
}

                </div>
              </div>
            );
          })}
        </div>
      </div>
    </section>
  );
}

/* ── Exit-intent lead magnet ── */
function ExitModal({ open, onClose }) {
  const [f, setF] = useState({ name: "", email: "" });
  const [done, setDone] = useState(false);
  const [loading, setLoading] = useState(false);
  if (!open) return null;
  const submit = async (e) => {
    e.preventDefault();
    if (!f.name || !f.email) return;
    setLoading(true);
    await fetch(FORMSPREE, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify({ _subject: "7-Day Blueprint Request", name: f.name, email: f.email, type: "blueprint" }),
    }).catch(() => {});
    setLoading(false);
    setDone(true);
  };
  return (
    <div className="fixed inset-0 z-50 bg-[#0c0f0e]/70 flex items-center justify-center p-4" onClick={onClose}>
      <div className="modal-card bg-white rounded-2xl max-w-md w-full p-7 sm:p-8 relative text-center" onClick={e => e.stopPropagation()}>
        <button onClick={onClose} aria-label="Close" className="absolute top-3.5 right-3.5 text-neutral-400 hover:text-[#0c0f0e]"><XIcon size={22}/></button>
        {!done ? (
          <>
            <div className="w-14 h-14 rounded-2xl bg-orange-100 text-orange-700 flex items-center justify-center mx-auto"><Book size={26}/></div>
            <h3 className="font-black text-2xl mt-4 leading-tight">Not ready to buy on Amazon yet?</h3>
            <p className="text-[15px] text-neutral-600 mt-2.5">
              Grab <strong className="text-[#0c0f0e]">The 7-Day Sunday Prep Blueprint (PDF)</strong> free — the exact plan to cook one afternoon and eat sorted all week.
            </p>
            <form onSubmit={submit} className="mt-5 space-y-2.5">
              <input required placeholder="First name" value={f.name} onChange={e => setF({ ...f, name: e.target.value })}
                     className="w-full border-2 border-neutral-300 focus:border-[#FF9900] outline-none rounded-lg px-4 py-3 text-[16px]"/>
              <input required type="email" placeholder="Your best email" value={f.email} onChange={e => setF({ ...f, email: e.target.value })}
                     className="w-full border-2 border-neutral-300 focus:border-[#FF9900] outline-none rounded-lg px-4 py-3 text-[16px]"/>
              <button type="submit" disabled={loading} style={{ backgroundColor: ORANGE }} className="w-full text-[#0f1111] font-extrabold rounded-lg px-5 py-3.5 text-lg hover:brightness-105 disabled:opacity-60 transition">
                {loading ? "Sending…" : "Send Me The Blueprint →"}
              </button>
            </form>
            <p className="text-[11px] text-neutral-400 mt-3">No spam. Unsubscribe anytime.</p>
          </>
        ) : (
          <>
            <div className="w-14 h-14 rounded-2xl bg-emerald-100 text-emerald-700 flex items-center justify-center mx-auto"><Check size={28} sw={2.6}/></div>
            <h3 className="font-black text-2xl mt-4">You're in, {f.name}.</h3>
            <p className="text-[15px] text-neutral-600 mt-2.5">The Blueprint is on its way to your inbox. While you're here —</p>
            <div className="mt-5"><CTA full>View Bundle Offer on Amazon &rarr;</CTA></div>
          </>
        )}
      </div>
    </div>
  );
}

/* ── App ── */
function App() {
  const heroRef = useRef(null);
  const [showSticky, setShowSticky] = useState(false);
  const [exitOpen, setExitOpen] = useState(false);
  const firedRef = useRef(false);

  useEffect(() => {
    const onScroll = () => {
      const h = heroRef.current ? heroRef.current.offsetHeight : 600;
      setShowSticky(window.scrollY > h * 0.8);
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });

    const fire = () => {
      if (firedRef.current) return;
      try { if (sessionStorage.getItem("hollis_exit")) return; } catch (_) {}
      firedRef.current = true;
      try { sessionStorage.setItem("hollis_exit", "1"); } catch (_) {}
      setExitOpen(true);
    };
    const onMouseOut = (e) => { if (e.clientY <= 0 && !e.relatedTarget) fire(); };
    document.addEventListener("mouseout", onMouseOut);

    let lastY = window.scrollY, lastT = Date.now();
    const onScrollExit = () => {
      const y = window.scrollY, t = Date.now();
      const v = (lastY - y) / Math.max(1, t - lastT);
      if (v > 1.1 && y < 400 && lastY > 500) fire();
      lastY = y; lastT = t;
    };
    window.addEventListener("scroll", onScrollExit, { passive: true });

    return () => {
      window.removeEventListener("scroll", onScroll);
      window.removeEventListener("scroll", onScrollExit);
      document.removeEventListener("mouseout", onMouseOut);
    };
  }, []);

  return (
    <>
      <Banner />
      <Hero heroRef={heroRef} />
      <OldVsNew />
      <ValueStack />
      <Verify />
      <FAQ />
      <Final />
      <footer className="bg-[#0c0f0e] text-center px-5 pt-8 pb-24 border-t border-neutral-800">
        <div className="max-w-2xl mx-auto mb-5 text-[11px] text-neutral-500 leading-relaxed border border-neutral-800 rounded-lg px-4 py-3 bg-neutral-900/60">
          <p>As an Amazon Associate, I earn from qualifying purchases. This site is not a part of the Facebook website or Facebook Inc. Additionally, This site is NOT endorsed by Facebook in any way.</p>
        </div>
        <p className="text-[12px] text-neutral-500 leading-relaxed">© 2026 Hollis Enterprises · Australian owned · 1040ml Borosilicate Glass Meal Prep Containers</p>
      </footer>
      <Sticky show={showSticky} />
      <ExitModal open={exitOpen} onClose={() => setExitOpen(false)} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
