              <Book size={26}/>

            <h3 className="font-display font-black text-2xl text-ink mt-4 leading-tight">Not buying today? Steal our system free.</h3>
            <p className="text-[15px] text-neutral-600 mt-2.5">
              Get <strong className="text-ink">The 7-Day Sunday Prep Blueprint</strong> — the exact plan to cook one afternoon and eat sorted all week. Sent straight to your inbox.
            </p>
            <form onSubmit={submit} className="mt-5 space-y-2.5">
              <input type="email" required value={email} onChange={(e) => setEmail(e.target.value)}
                     placeholder="Your best email"
                     className="w-full border-2 border-neutral-300 focus:border-amber-500 outline-none rounded-lg px-4 py-3 text-[16px]"/>
              <button type="submit"
                      className="w-full bg-amber-500 hover:bg-amber-400 text-ink font-display font-extrabold rounded-lg px-5 py-3.5 text-lg">
                Send Me The Blueprint &rarr;
              </button>
            </form>
            <p className="text-[11px] text-neutral-400 mt-3">No spam. Unsubscribe anytime. We'll never share your details.</p>
          </>
        ) : (
          <>
            <div className="w-14 h-14 rounded-2xl bg-emerald-100 text-emerald-700 flex items-center justify-center mx-auto">
              <Check size={28} sw={2.6}/>
            </div>
            <h3 className="font-display font-black text-2xl text-ink mt-4">You're in. Check your inbox.</h3>
            <p className="text-[15px] text-neutral-600 mt-2.5">The 7-Day Sunday Prep Blueprint is on its way. While you're here —</p>
            <div className="mt-5"><CTA full>Get My 10-Pack Bundle — $59.99 &rarr;</CTA></div>
          </>
        )}
      </div>
    </div>
  );
}

/* ── App ── */
function App() {
  const heroRef = useRef(null);
  const [showSticky, setShowSticky] = useState(false);
  const [exitOpen, setExitOpen] = useState(false);
  const firedRef = useRef(false);

  useEffect(() => {
    // Sticky CTA after hero
    const onScroll = () => {
      const h = heroRef.current ? heroRef.current.offsetHeight : 600;
      setShowSticky(window.scrollY > h * 0.8);
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });

    // Exit intent — desktop: cursor leaves top
    const fire = () => {
      if (firedRef.current) return;
      try { if (sessionStorage.getItem("hollis_exit")) return; } catch (_) {}
      firedRef.current = true;
      try { sessionStorage.setItem("hollis_exit", "1"); } catch (_) {}
      setExitOpen(true);
    };
    const onMouseOut = (e) => { if (e.clientY <= 0 && !e.relatedTarget) fire(); };
    document.addEventListener("mouseout", onMouseOut);

    // Exit intent — mobile: fast scroll up near the top
    let lastY = window.scrollY, lastT = Date.now();
    const onScrollExit = () => {
      const y = window.scrollY, t = Date.now();
      const v = (lastY - y) / Math.max(1, t - lastT); // px per ms upward
      if (v > 1.1 && y < 400 && lastY > 500) fire();
      lastY = y; lastT = t;
    };
    window.addEventListener("scroll", onScrollExit, { passive: true });

    return () => {
      window.removeEventListener("scroll", onScroll);
      window.removeEventListener("scroll", onScrollExit);
      document.removeEventListener("mouseout", onMouseOut);
    };
  }, []);

  return (
    <>
      <Banner />
      <Hero heroRef={heroRef} />
      <OldVsNew />
      <ValueStack />
      <Guarantee />
      <FAQ />
      <Final />
      <Referral />
      <footer className="bg-ink text-center px-5 py-7 pb-24">
        <p className="text-[12px] text-neutral-500 leading-relaxed">
          © 2025 Hollis Enterprises · Australian owned · 1040ml Borosilicate Glass Meal Prep Containers
        </p>
      </footer>
      <Sticky show={showSticky} />
      <ExitModal open={exitOpen} onClose={() => setExitOpen(false)} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
